# Gera a lista de leads no GitHub Actions, baixando os dados da RFB, rodando
# o pipeline e publicando o Excel como artifact e como release.
#
# IMPORTANTE: o servidor da RFB (arquivos.receitafederal.gov.br) recusa
# conexões de IPs fora do Brasil, então os runners hospedados do GitHub
# (ubuntu-latest) NÃO conseguem baixar os dados. Para gerar a lista de
# verdade, registre um runner self-hosted numa máquina/VPS com IP brasileiro
# (Settings -> Actions -> Runners -> New self-hosted runner) e deixe o input
# "runner" como "self-hosted" (padrão). Veja o README, seção
# "Rodar a partir de um IP brasileiro".
name: Gerar lista de leads

on:
  # Execução manual: aba Actions -> "Gerar lista de leads" -> Run workflow
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner: self-hosted (IP BR, gera a lista) ou ubuntu-latest (só teste do código; falha no download)"
        default: "self-hosted"
        required: false
        type: choice
        options: ["self-hosted", "ubuntu-latest"]
      limite_arquivos:
        description: "Shards por tipo (0 = todos; 1 = teste rápido, lista incompleta)"
        default: "0"
        required: false
  # A RFB publica dados novos no início de cada mês; roda todo dia 15
  # (usa o runner self-hosted brasileiro).
  schedule:
    - cron: "0 6 15 * *"

permissions:
  contents: write

jobs:
  gerar:
    # Runner escolhido no dispatch; nos demais gatilhos usa o self-hosted BR
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Aplicar limite de arquivos (modo teste)
        if: ${{ inputs.limite_arquivos != '' && inputs.limite_arquivos != '0' && inputs.limite_arquivos != null }}
        env:
          LIMITE: ${{ inputs.limite_arquivos }}
        run: |
          python - <<'PY'
          import os, re, pathlib
          caminho = pathlib.Path("config.yaml")
          texto = caminho.read_text(encoding="utf-8")
          texto = re.sub(r"limite_arquivos:\s*\d+", f"limite_arquivos: {int(os.environ['LIMITE'])}", texto)
          caminho.write_text(texto, encoding="utf-8")
          print(f"limite_arquivos ajustado para {os.environ['LIMITE']} (lista sairá INCOMPLETA)")
          PY

      - name: Rodar pipeline (download RFB + carga + score + Excel)
        run: python -m gerador_leads_bpo --config config.yaml

      - name: Publicar planilha como artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads-bpo
          path: saida/leads_bpo.xlsx
          retention-days: 90

      - name: Publicar release com a planilha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="leads-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$TAG" saida/leads_bpo.xlsx \
            --title "Lista de leads — $(date -u +%d/%m/%Y)" \
            --notes "Gerada automaticamente a partir dos Dados Abertos do CNPJ (Receita Federal), com o ICP definido em config.yaml. Dados públicos, uso B2B — ver aviso de LGPD no README."
